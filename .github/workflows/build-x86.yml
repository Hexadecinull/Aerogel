name: Build x86

on:
  push:
    branches: [main, dev]
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y nasm gcc-multilib g++-multilib cmake \
            qemu-system-x86 ovmf xorriso python3 dosfstools mtools

      - name: Install Rust toolchain
        run: |
          curl --proto '=https' --tlsv1.2 -sSf https://sh.rustup.rs | \
            sh -s -- -y --default-toolchain nightly
          source ~/.cargo/env
          rustup target add i686-unknown-linux-gnu

      - name: Build Rust network core
        run: |
          source ~/.cargo/env
          cd rust
          cargo build --release --target ../rust/targets/aerogel-x86.json \
            -Z build-std=core \
            -Z build-std-features=compiler-builtins-mem 2>/dev/null || \
          cargo build --release --target i686-unknown-linux-gnu
        continue-on-error: true

      - name: Build bootloader
        run: make -C arch/x86/boot all

      - name: Configure kernel
        run: |
          cmake -B build/x86 \
            -DAEROGEL_ARCH=x86 \
            -DCMAKE_TRY_COMPILE_TARGET_TYPE=STATIC_LIBRARY \
            -DCMAKE_C_COMPILER=gcc \
            -DCMAKE_CXX_COMPILER=g++ \
            -DCMAKE_ASM_NASM_COMPILER=nasm \
            -DCMAKE_C_FLAGS="-m32"

      - name: Build kernel
        run: cmake --build build/x86 -- -j$(nproc)

      - name: Create disk image
        run: |
          python3 tools/scripts/create-disk.py \
            --arch x86 \
            --mbr    arch/x86/boot/mbr.bin \
            --stage2 arch/x86/boot/stage2.bin \
            --kernel build/x86/kernel/kernel.bin \
            --output build/aerogel-x86.img

      - name: Smoke test
        run: |
          timeout 8 qemu-system-i386 \
            -drive file=build/aerogel-x86.img,format=raw,if=ide \
            -m 256M -display none -serial stdio -no-reboot 2>&1 | head -40 || true

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: aerogel-x86-${{ github.sha }}
          path: build/aerogel-x86.img
          retention-days: 14
